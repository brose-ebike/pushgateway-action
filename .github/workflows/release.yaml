name: Release
on:
  workflow_dispatch:

jobs:
  build:
    name: "Build Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.8"
      - id: vars
        name: "Determine Tag Name"
        run: |
          TAG_VERSION=$(python3 .github/release.py print)
          echo "tag=$TAG_VERSION" >> "$GITHUB_OUTPUT"
      - name: "Prepare Git"
        run: |
          git config --global user.email "85950872+brose-ebike-bot@users.noreply.github.com"
          git config --global user.name "brose-ebike[bot]"
          git checkout -b release
      - name: Create Release Tag
        run: |
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release Version ${{ steps.vars.outputs.tag }}"
          python3 .github/release.py inc
          git add package.json
          git commit -m "Release ${{ steps.vars.outputs.tag }} and increment version"
          git push --follow-tags --set-upstream origin release
      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "release"
          destination_branch: "main"
          pr_label: "release"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - id: content
        name: Create Release Content
        uses: raynigon/release-documentation@cc6d191c791ae349b003405670841ff9a5866e9b
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          latest: "${{ steps.vars.outputs.tag }}"
      - name: "Github Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe #v2.5.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tag_name: "${{ steps.vars.outputs.tag }}"
          name: "${{ steps.vars.outputs.tag }}"
          body: ${{ steps.content.outputs.content }}
